<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <header>
            <h1>Tetris</h1>
            <p class="sub">Classic blocks. Modern shine.</p>
        </header>
        <div id="game-container">
            <canvas id="tetris" width="300" height="600" aria-label="Tetris game"></canvas>
            <div id="info">
                <div class="panel">
                    <div id="score">Score: <span id="score-value">0</span></div>
                    <div id="lines">Lines: <span id="lines-value">0</span></div>
                    <div id="level">Level: <span id="level-value">0</span></div>
                </div>
                <div class="panel">
                    <h3>Next Piece</h3>
                    <canvas id="next" width="120" height="120" aria-label="Next piece preview"></canvas>
                </div>
                <div class="panel controls">
                    <h3>Controls</h3>
                    <ul>
                        <li>← / → : Move</li>
                        <li>↑ : Rotate</li>
                        <li>↓ : Soft drop</li>
                        <li>Space : Hard drop</li>
                        <li>P : Pause</li>
                    </ul>
                </div>
            </div>
        </div>
        <footer>
            <small>Made with HTML5 Canvas & Vanilla JS</small>
        </footer>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
