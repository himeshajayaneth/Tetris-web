<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#1e3c72"/>
      <stop offset="1" stop-color="#2a5298"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <g transform="translate(80,40)">
    <rect width="1120" height="320" rx="18" fill="#071026" opacity="0.8" />
    <g transform="translate(40,20)">
      <!-- stylized TETRIS text -->
      <text x="0" y="70" font-family="Rubik, sans-serif" font-size="72" fill="#fff" font-weight="700">Tetris</text>
      <text x="0" y="120" font-family="Rubik, sans-serif" font-size="20" fill="#ffd54d">Classic blocks · Modern shine</text>

      <!-- decorative grid of colorful blocks -->
      <g transform="translate(420,10)">
        <!-- a cluster of blocks -->
        <rect x="0" y="0" width="56" height="56" rx="6" fill="#00f0f0" />
        <rect x="56" y="0" width="56" height="56" rx="6" fill="#0000f0" />
        <rect x="112" y="0" width="56" height="56" rx="6" fill="#f0a000" />
        <rect x="0" y="56" width="56" height="56" rx="6" fill="#f0f000" />
        <rect x="56" y="56" width="56" height="56" rx="6" fill="#00f000" />
        <rect x="112" y="56" width="56" height="56" rx="6" fill="#a000f0" />
        <rect x="168" y="56" width="56" height="56" rx="6" fill="#f00000" />
      </g>

      <!-- glow effect -->
      <g transform="translate(420,10)" filter="url(#blur)">
        <rect x="-10" y="-10" width="230" height="140" rx="20" fill="#ffffff" opacity="0.03" />
      </g>

      <!-- small callout -->
      <g transform="translate(420,170)">
        <rect x="0" y="0" width="420" height="90" rx="12" fill="#0b1220" opacity="0.9" />
        <text x="18" y="28" font-family="Rubik, sans-serif" font-size="16" fill="#fff">Features:</text>
        <text x="18" y="52" font-family="Rubik, sans-serif" font-size="14" fill="#cfe8ff">• SRS rotation · Hold · Ghost · Mobile</text>
        <text x="18" y="72" font-family="Rubik, sans-serif" font-size="14" fill="#cfe8ff">• High score · Sound toggle · Polished UI</text>
      </g>
    </g>
  </g>
</svg>
